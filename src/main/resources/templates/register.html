<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register - TODO Rails</title>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<div class="auth-wrapper">
    <div class="auth-card">
        <h1>Create Account</h1>
        <p class="subtitle">Start managing your tasks today</p>

        <form th:action="@{/register}" th:object="${user}" method="post">
            <div class="form-group">
                <label>Username</label>
                <input type="text" th:field="*{username}"
                       placeholder="Enter username"/>
                <span class="error-msg"
                      th:if="${#fields.hasErrors('username')}"
                      th:errors="*{username}"></span>
                <span class="error-msg"
                      th:if="${usernameError}"
                      th:text="${usernameError}"></span>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" th:field="*{email}"
                       placeholder="Enter email"/>
                <span class="error-msg"
                      th:if="${#fields.hasErrors('email')}"
                      th:errors="*{email}"></span>
                <span class="error-msg"
                      th:if="${emailError}"
                      th:text="${emailError}"></span>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" th:field="*{password}"
                       placeholder="Min 6 characters"/>
                <span class="error-msg"
                      th:if="${#fields.hasErrors('password')}"
                      th:errors="*{password}"></span>
            </div>
            <button type="submit" class="btn btn-primary">
                Create Account
            </button>
        </form>

        <p style="text-align:center; margin-top:1.5rem; font-size:0.9rem; color:#64748b;">
            Already have an account?
            <a th:href="@{/login}">Login here</a>
        </p>
    </div>
</div>
</body>
</html>
