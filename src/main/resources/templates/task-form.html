<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${editMode} ? 'Edit Task' : 'Add Task'">Task - TODO Rails</title>
</head>
<body>

<!-- Title changes based on mode -->
<h1 th:text="${editMode} ? 'Edit Task' : 'Add New Task'">Task Form</h1>

<!--
  th:action changes based on mode:
  - add mode:  action = /tasks/new
  - edit mode: action = /tasks/edit/3  (using task's id)
-->
<form id="taskForm"
      th:action="${editMode} ? @{/tasks/edit/{id}(id=${task.id})} : @{/tasks/new}"
      th:object="${task}"
      method="post">

    <!-- Title -->
    <div>
        <label>Title *</label>
        <input type="text"
               th:field="*{title}"
               id="title"
               placeholder="What needs to be done?"/>
        <span th:if="${#fields.hasErrors('title')}"
              th:errors="*{title}"
              style="color:red">
        </span>
        <span id="titleError" style="color:red"></span>
    </div>

    <!-- Description -->
    <div>
        <label>Description</label>
        <textarea th:field="*{description}"
                  id="description"
                  placeholder="Optional details..."
                  rows="3">
        </textarea>
    </div>

    <!-- Priority -->
    <div>
        <label>Priority *</label>
        <select th:field="*{priority}" id="priority">
            <option th:each="p : ${priorities}"
                    th:value="${p}"
                    th:text="${p}">
            </option>
        </select>
    </div>

    <!-- Task Type -->
    <div>
        <label>Type *</label>
        <select th:field="*{taskType}" id="taskType">
            <option th:each="t : ${taskTypes}"
                    th:value="${t}"
                    th:text="${t}">
            </option>
        </select>
    </div>

    <!-- Due Date -->
    <div>
        <label>Due Date</label>
        <input type="date"
               th:field="*{dueDate}"
               id="dueDate"/>
        <span id="dueDateError" style="color:red"></span>
    </div>

    <!-- Completed checkbox — only show in edit mode -->
    <div th:if="${editMode}">
        <label>
            <input type="checkbox"
                   th:field="*{completed}"/>
            Mark as completed
        </label>
    </div>

    <!-- Buttons -->
    <div>
        <!-- button text changes based on mode -->
        <button type="submit" id="submitBtn"
                th:text="${editMode} ? 'Update Task' : 'Add Task'">
            Submit
        </button>
        <a th:href="@{/dashboard}">Cancel</a>
    </div>

</form>

<script th:src="@{/js/task-form.js}"></script>

</body>
</html>
