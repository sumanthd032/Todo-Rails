<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Task - TODO Rails</title>
</head>
<body>

<h1>Add New Task</h1>

<form id="taskForm"
      th:action="@{/tasks/new}"
      th:object="${task}"
      method="post">

    <!-- Title -->
    <div>
        <label>Title *</label>
        <input type="text"
               th:field="*{title}"
               id="title"
               placeholder="What needs to be done?"/>
        <span th:if="${#fields.hasErrors('title')}"
              th:errors="*{title}"
              style="color:red">
        </span>
        <!-- JS will put error here -->
        <span id="titleError" style="color:red"></span>
    </div>

    <!-- Description -->
    <div>
        <label>Description</label>
        <textarea th:field="*{description}"
                  id="description"
                  placeholder="Optional details..."
                  rows="3">
        </textarea>
    </div>

    <!-- Priority dropdown -->
    <div>
        <label>Priority *</label>
        <select th:field="*{priority}" id="priority">
            <!--
              th:each loops over priorities list we passed from controller
              th:value sets the option value
              th:text sets the display text
            -->
            <option th:each="p : ${priorities}"
                    th:value="${p}"
                    th:text="${p}">
            </option>
        </select>
    </div>

    <!-- Task Type dropdown -->
    <div>
        <label>Type *</label>
        <select th:field="*{taskType}" id="taskType">
            <option th:each="t : ${taskTypes}"
                    th:value="${t}"
                    th:text="${t}">
            </option>
        </select>
    </div>

    <!-- Due Date -->
    <div>
        <label>Due Date</label>
        <input type="date"
               th:field="*{dueDate}"
               id="dueDate"/>
        <span id="dueDateError" style="color:red"></span>
    </div>

    <!-- Buttons -->
    <div>
        <button type="submit" id="submitBtn">Add Task</button>
        <a th:href="@{/dashboard}">Cancel</a>
    </div>

</form>

<!-- Load our JS file — must be at bottom of body -->
<script th:src="@{/js/task-form.js}"></script>

</body>
</html>
