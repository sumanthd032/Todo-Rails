<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - TODO Rails</title>
</head>
<body>

<!-- Top bar -->
<div>
    <h1>TODO Rails</h1>
    <span>Welcome, <strong th:text="${user.username}">username</strong>!</span>
    <form th:action="@{/logout}" method="post" style="display:inline">
        <button type="submit">Logout</button>
    </form>
</div>

<!-- Stats bar -->
<div>
    <span>Total: <strong th:text="${totalTasks}">0</strong></span>
    <span>Pending: <strong th:text="${pendingTasks}">0</strong></span>
    <span>Completed: <strong th:text="${completedTasks}">0</strong></span>
</div>

<!-- Flash message -->
<div id="successMessage"
     th:if="${successMessage}"
     style="color:green; padding:10px; border:1px solid green; margin:10px 0;">
    <span th:text="${successMessage}"></span>
</div>

<!-- Add task button -->
<div>
    <a th:href="@{/tasks/new}">+ Add New Task</a>
</div>

<!-- Tasks table -->
<div>
    <p th:if="${tasks.isEmpty()}">
        No tasks yet. Add your first task!
    </p>

    <table th:if="${!tasks.isEmpty()}">
        <thead>
        <tr>
            <th>Title</th>
            <th>Priority</th>
            <th>Type</th>
            <th>Due Date</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="task : ${tasks}">
            <td th:text="${task.title}">Task title</td>
            <td th:text="${task.priority}">Priority</td>
            <td th:text="${task.taskType}">Type</td>
            <td th:text="${task.dueDate != null ? task.dueDate : '-'}">Date</td>
            <td th:text="${task.completed ? 'Done' : 'Pending'}">Status</td>
            <td>
                <a th:href="@{/tasks/edit/{id}(id=${task.id})}">Edit</a>
                |
                <form th:action="@{/tasks/delete/{id}(id=${task.id})}"
                      method="post"
                      style="display:inline">
                    <!--
                      th:attr sets a custom HTML attribute
                      here we pass the task title to our JS function
                      so the confirm message says the actual task name
                    -->
                    <button type="submit"
                            th:attr="onclick='return confirmDelete(\'' + ${task.title} + '\')'">
                        Delete
                    </button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<!-- Load dashboard JS at bottom of body -->
<script th:src="@{/js/dashboard.js}"></script>

</body>
</html>
