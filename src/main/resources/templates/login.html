<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - TODO Rails</title>
</head>
<body>

<h1>Login to TODO Rails</h1>

<!-- success message after registration -->
<p th:if="${param.registered}"
   style="color:green">
    Account created! Please log in.
</p>

<!-- error message for wrong credentials -->
<p th:if="${param.error}"
   style="color:red">
    Invalid username or password.
</p>

<!-- logout success message -->
<p th:if="${param.logout}"
   style="color:blue">
    You have been logged out.
</p>

<!--
  IMPORTANT: action must be /login and method must be POST
  Spring Security intercepts this POST automatically
  Input names must be exactly "username" and "password"
-->
<form th:action="@{/login}" method="post">

    <div>
        <label>Username</label>
        <input type="text"
               name="username"
               placeholder="Enter username"
               required/>
    </div>

    <div>
        <label>Password</label>
        <input type="password"
               name="password"
               placeholder="Enter password"
               required/>
    </div>

    <button type="submit">Login</button>

</form>

<p>Don't have an account? <a th:href="@{/register}">Register here</a></p>

</body>
</html>
